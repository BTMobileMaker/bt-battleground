<!DOCTYPE html>
<html>
<head>
    <title>BT Battleground Pro</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        .ui-layer { position: fixed; width: 100%; height: 100%; pointer-events: none; }
        .btn { pointer-events: auto; position: absolute; background: rgba(255,0,0,0.7); color: white; border-radius: 50%; width: 70px; height: 70px; border: 2px solid white; font-weight: bold; }
        #fire { bottom: 50px; right: 50px; }
        #jump { bottom: 130px; right: 130px; background: rgba(0,0,0,0.5); }
    </style>
</head>
<body>
    <div class="ui-layer">
        <button class="btn" id="fire">FIRE</button>
        <button class="btn" id="jump">JUMP</button>
    </div>

    <a-scene joystick>
        <a-sky color="#87CEEB"></a-sky>

        <a-plane position="0 0 0" rotation="-90 0 0" width="100" height="100" color="#2d5a27"></a-plane>

        <a-entity id="player" position="0 1.6 0">
            <a-camera look-controls="pointerLockEnabled: false">
                <a-box position="0.3 -0.4 -0.5" width="0.1" height="0.1" depth="0.5" color="black"></a-box>
            </a-camera>
        </a-entity>

        <a-box position="-5 1 -10" color="#4b3621" width="2" height="2" depth="2"></a-box> <a-cylinder position="5 2 -15" radius="0.5" height="4" color="#228B22"></a-cylinder> </a-scene>

    <script>
        document.getElementById('fire').addEventListener('touchstart', function() {
            alert("Dishkyoon! Gun shooting start...");
        });
    </script>
</body>
</html>
