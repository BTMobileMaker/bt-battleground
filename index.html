<!DOCTYPE html>
<html>
<head>
    <title>BT Minecraft Edition</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <style>
        .crosshair {
            position: fixed; top: 50%; left: 50%;
            width: 20px; height: 20px;
            border: 2px solid white; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
            z-index: 10;
        }
        .hotbar {
            position: fixed; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(0,0,0,0.5);
            padding: 10px; border-radius: 5px;
        }
        .slot { width: 40px; height: 40px; border: 2px solid #fff; background: #555; }
    </style>
</head>
<body>
    <div class="crosshair"></div>
    <div class="hotbar">
        <div class="slot" style="background: green;"></div>
        <div class="slot" style="background: brown;"></div>
        <div class="slot" style="background: gray;"></div>
    </div>

    <a-scene shadow="type: pcfsoft">
        <!-- Minecraft Sky -->
        <a-sky color="#6EB1FF"></a-sky>

        <!-- Grass Block Ground (Repeated Pattern) -->
        <a-entity id="ground" geometry="primitive: plane; width: 100; height: 100" 
                  rotation="-90 0 0" material="src: https://i.imgur.com/89797.jpg; repeat: 50 50"></a-entity>

        <!-- Player with Block-Hand -->
        <a-entity id="rig" movement-controls="fly: false; speed: 0.2">
            <a-entity camera position="0 1.6 0" look-controls>
                <a-entity id="hand-block" position="0.4 -0.3 -0.5" 
                          geometry="primitive: box; width: 0.2; height: 0.2; depth: 0.2" 
                          material="color: #4da6ff"></a-entity>
            </a-camera>
        </a-entity>

        <!-- Minecraft Style House (Cubes se bana) -->
        <a-entity position="-5 0 -10">
            <!-- Walls -->
            <a-box position="0 1.5 0" width="6" height="3" depth="6" color="#8B4513" material="roughness: 1"></a-box>
            <!-- Roof -->
            <a-box position="0 3.2 0" width="7" height="0.5" depth="7" color="#4a4a4a"></a-box>
            <!-- Door Hole -->
            <a-box position="0 1 -3.05" width="1.2" height="2" depth="0.1" color="#000"></a-box>
        </a-entity>

        <!-- Blocky Trees -->
        <a-entity position="8 0 -12">
            <a-box position="0 1.5 0" width="0.8" height="3" depth="0.8" color="#5C4033"></a-box> <!-- Trunk -->
            <a-box position="0 4 0" width="3" height="2" depth="3" color="#228B22"></a-box> <!-- Leaves -->
        </a-entity>

        <!-- Lights for Realism -->
        <a-light type="ambient" color="#FFF" intensity="0.7"></a-light>
        <a-light type="directional" color="#FFF" intensity="0.5" position="-1 2 1"></a-light>
    </a-scene>
</body>
            </html>
