<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Battle Royale</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* UI Elements */
        #ui-layer { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        .controls { position: absolute; bottom: 30px; pointer-events: auto; }
        
        #joystick-container { left: 30px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; }
        #fire-btn { right: 30px; bottom: 50px; width: 70px; height: 70px; background: rgba(255, 0, 0, 0.6); border-radius: 50%; border: 3px solid white; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        
        #mic-btn { position: absolute; top: 20px; right: 20px; padding: 10px 20px; background: rgba(0,0,0,0.6); color: white; border-radius: 20px; border: 1px solid #fff; pointer-events: auto; }
        
        #char-menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; z-index: 100; }
        .menu-btn { padding: 15px 40px; margin: 10px; font-size: 18px; cursor: pointer; border-radius: 30px; border: none; background: #ff4757; color: white; }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <!-- Character Selection -->
    <div id="char-menu">
        <h1>BATTLE ROYALE MOBILE</h1>
        <p>Apna Character Chunein:</p>
        <button class="menu-btn" onclick="startGame('Male')">MALE CHARACTER</button>
        <button class="menu-btn" style="background: #e84393;" onclick="startGame('Female')">FEMALE CHARACTER</button>
    </div>

    <!-- Game HUD -->
    <div id="ui-layer">
        <div id="crosshair"></div>
        <button id="mic-btn" onclick="toggleMic()">🎤 Mic: OFF</button>
        <div id="fire-btn" onclick="shoot()">FIRE</div>
        <div id="joystick-container" class="controls"></div>
    </div>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        let scene, camera, renderer, player;
        let isMicOn = false;

        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb); // Realistic Sky Blue

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Lighting (Realistic look ke liye)
            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
            scene.add(light);

            // Battleground (Ground)
            const grid = new THREE.GridHelper(100, 50, 0x000000, 0x000000);
            grid.material.opacity = 0.2;
            grid.material.transparent = true;
            scene.add(grid);

            const groundGeo = new THREE.PlaneGeometry(100, 100);
            const groundMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
            const ground = new THREE.Mesh(groundGeo, groundMat);
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            camera.position.set(0, 5, 10);
            camera.lookAt(0, 0, 0);
        }

        function startGame(gender) {
            document.getElementById('char-menu').style.display = 'none';
            initScene();

            // Player Placeholder (Male/Female color difference)
            const geometry = new THREE.CylinderGeometry(0.5, 0.5, 2, 32);
            const material = new THREE.MeshPhongMaterial({ 
                color: (gender === 'Male') ? 0x1e90ff : 0xff69b4 
            });
            player = new THREE.Mesh(geometry, material);
            player.position.y = 1;
            scene.add(player);

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if(player) {
                // Yahan movement logic aayega
            }
            renderer.render(scene, camera);
        }

        // Shooting Logic
        function shoot() {
            console.log("Goli Chali!");
            // Screen shake effect ya sound yahan add karein
            document.getElementById('fire-btn').style.transform = "scale(0.9)";
            setTimeout(() => {
                document.getElementById('fire-btn').style.transform = "scale(1)";
            }, 50);
        }

        // Voice Chat (Mike) Logic
        async function toggleMic() {
            const btn = document.getElementById('mic-btn');
            if (!isMicOn) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    isMicOn = true;
                    btn.innerText = "🎤 Mic: ON";
                    btn.style.background = "#2ed573";
                } catch (err) {
                    alert("Mic access nahi mila!");
                }
            } else {
                isMicOn = false;
                btn.innerText = "🎤 Mic: OFF";
                btn.style.background = "rgba(0,0,0,0.6)";
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
  </html>
