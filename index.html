<!DOCTYPE html>
<html>
<head>
    <title>BT Minecraft Realistic Pro</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
</head>
<body>
    <a-scene fog="type: exponential; color: #ABC9FF; density: 0.002">
        <!-- Assets for 3D Models -->
        <a-assets>
            <img id="grass" src="https://cdn.glitch.global/363f8d39-3a8e-4860-9197-046603a113d0/grass.jpg">
            <img id="sky" src="https://cdn.glitch.global/363f8d39-3a8e-4860-9197-046603a113d0/sunset.jpg">
        </a-assets>

        <!-- Realistic Sunset Sky -->
        <a-sky src="#sky" rotation="0 -90 0"></a-sky>

        <!-- Big Grass World -->
        <a-plane position="0 0 0" rotation="-90 0 0" width="500" height="500" src="#grass" repeat="100 100" shadow="receive: true"></a-plane>

        <!-- Player with Voice/Movement -->
        <a-entity id="rig" movement-controls="fly: false; speed: 0.3">
            <a-entity camera position="0 1.6 0" look-controls>
                <a-cursor color="#FFF"></a-cursor>
                <!-- Hand with Diamond Sword (1000002707.jpg style) -->
                <a-entity position="0.5 -0.4 -0.6" rotation="0 90 0">
                    <a-box width="0.1" height="0.6" depth="0.1" color="#4ee2ec"></a-box>
                </a-entity>
            </a-entity>
        </a-entity>

        <!-- Realistic Large House (1000002713.jpg style) -->
        <a-entity position="0 0 -15">
            <!-- Ground Floor -->
            <a-box position="0 2 0" width="10" height="4" depth="10" color="#7d5c41" material="roughness: 1"></a-box>
            <!-- First Floor -->
            <a-box position="0 5.5 0" width="8" height="3" depth="8" color="#e3d4c3"></a-box>
            <!-- Entrance -->
            <a-plane position="0 1 5.01" width="2" height="3" color="#3d2b1f"></a-plane>
            <!-- Roof -->
            <a-cone position="0 8.5 0" radius-bottom="7" height="4" color="#4a4a4a"></a-cone>
        </a-entity>

        <!-- Forest (Pedar - 1000002709.jpg style) -->
        <a-entity id="forest">
            <!-- Random Trees -->
            <a-entity position="-15 0 -20">
                <a-cylinder radius="0.5" height="5" color="#5C4033"></a-cylinder>
                <a-sphere position="0 4 0" radius="3" color="#228B22"></a-sphere>
            </a-entity>
            <a-entity position="20 0 -30">
                <a-cylinder radius="0.7" height="6" color="#5C4033"></a-cylinder>
                <a-sphere position="0 5 0" radius="4" color="#1a5e1a"></a-sphere>
            </a-entity>
        </a-entity>

        <!-- Animals (1000002712.jpg style) -->
        <a-box position="5 0.5 -10" width="1" height="1" depth="1.5" color="white">
            <a-box position="0 0.8 0.8" width="0.6" height="0.6" depth="0.6" color="white"></a-box> <!-- Cow/Dog Head -->
        </a-box>

        <!-- Lights -->
        <a-light type="ambient" color="#BBB"></a-light>
        <a-light type="directional" color="#FFF" intensity="0.6" position="-1 1 1" castShadow="true"></a-light>

    </a-scene>
</body>
</html>
